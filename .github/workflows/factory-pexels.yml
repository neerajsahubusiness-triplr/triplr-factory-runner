name: Factory Pexels Enrichment Large

on:
  workflow_dispatch:
    inputs:
      hub_count:
        description: "How many hubs to fully complete"
        required: true
        default: "1"

      activity_limit:
        description: "Activities per Worker call"
        required: true
        default: "20"

      max_calls_per_hub:
        description: "Maximum Worker calls per hub"
        required: true
        default: "35"

      pause_seconds:
        description: "Pause between calls"
        required: true
        default: "5"

      tiers:
        description: "Hub tiers"
        required: true
        default: "large"

      fixed_hub_id:
        description: "Optional fixed canonical hub ID"
        required: false
        default: ""

  schedule:
    - cron: "17 * * * *"

concurrency:
  group: factory-pexels-large-hourly
  cancel-in-progress: false

jobs:
  pexels-enrichment:
    runs-on: ubuntu-latest

    env:
      FACTORY_URL: https://triplr-factory.neeraj-sahu-business.workers.dev
      FACTORY_TOKEN: ${{ secrets.FACTORY_ADMIN_TOKEN }}

    steps:
      - name: Complete Pexels Large hubs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            HUB_COUNT="1"
            ACTIVITY_LIMIT="20"
            MAX_CALLS_PER_HUB="35"
            PAUSE_SECONDS="5"
            TIERS="large"
            FIXED_HUB_ID=""
          else
            HUB_COUNT="${{ inputs.hub_count }}"
            ACTIVITY_LIMIT="${{ inputs.activity_limit }}"
            MAX_CALLS_PER_HUB="${{ inputs.max_calls_per_hub }}"
            PAUSE_SECONDS="${{ inputs.pause_seconds }}"
            TIERS="${{ inputs.tiers }}"
            FIXED_HUB_ID="${{ inputs.fixed_hub_id }}"
          fi

          IFS=',' read -ra TIER_ARRAY <<< "$TIERS"

          TIER_JSON=$(printf '%s\n' "${TIER_ARRAY[@]}" \
            | jq -R . \
            | jq -s .)

          for HUB_NUMBER in $(seq 1 "$HUB_COUNT"); do
            echo ""
            echo "========================================"
            echo "Starting Pexels Large hub $HUB_NUMBER / $HUB_COUNT"
            echo "========================================"

            if [ -n "$FIXED_HUB_ID" ]; then
              CLAIM_BODY=$(jq -n \
                --arg hub_id "$FIXED_HUB_ID" \
                --argjson tiers "$TIER_JSON" \
                '{
                  hub_id: $hub_id,
                  tiers: $tiers
                }')
            else
              CLAIM_BODY=$(jq -n \
                --argjson tiers "$TIER_JSON" \
                '{
                  tiers: $tiers
                }')
            fi

            CLAIM_HTTP_CODE=$(curl -sS \
              -o pexels-claim-response.json \
              -w "%{http_code}" \
              -X POST \
              "$FACTORY_URL/factory/claim-pexels-hub" \
              -H "Content-Type: application/json" \
              -H "x-factory-token: $FACTORY_TOKEN" \
              --data "$CLAIM_BODY")

            echo "Claim HTTP status: $CLAIM_HTTP_CODE"
            echo "Claim response:"
            cat pexels-claim-response.json
            echo ""

            if [ "$CLAIM_HTTP_CODE" -lt 200 ] || \
               [ "$CLAIM_HTTP_CODE" -ge 300 ]; then
              echo "Pexels hub claim failed."
              exit 1
            fi

            if ! jq empty pexels-claim-response.json >/dev/null 2>&1; then
              echo "Claim response is not valid JSON."
              exit 1
            fi

            CLAIM_OK=$(jq -r '.ok // false' pexels-claim-response.json)

            if [ "$CLAIM_OK" != "true" ]; then
              echo "Pexels claim returned failure."
              exit 1
            fi

            HUB_ID=$(jq -r '.hub_id // empty' pexels-claim-response.json)
            HUB_NAME=$(jq -r '.hub_name // "Unknown hub"' pexels-claim-response.json)

            if [ -z "$HUB_ID" ]; then
              echo "No pending Large Pexels hubs found."
              exit 0
            fi

            echo "Locked Pexels Large hub:"
            echo "$HUB_NAME ($HUB_ID)"

            HUB_COMPLETE="false"

            for CALL_NUMBER in $(seq 1 "$MAX_CALLS_PER_HUB"); do
              echo ""
              echo "----------------------------------------"
              echo "Pexels call $CALL_NUMBER / $MAX_CALLS_PER_HUB"
              echo "Hub: $HUB_ID"
              echo "Activity limit: $ACTIVITY_LIMIT"
              echo "----------------------------------------"

              BODY=$(jq -n \
                --arg hub_id "$HUB_ID" \
                --argjson activity_limit "$ACTIVITY_LIMIT" \
                '{
                  hub_id: $hub_id,
                  activity_limit: $activity_limit
                }')

              HTTP_CODE=$(curl -sS \
                -o pexels-response.json \
                -w "%{http_code}" \
                -X POST \
                "$FACTORY_URL/factory/enrich-next-pexels" \
                -H "Content-Type: application/json" \
                -H "x-factory-token: $FACTORY_TOKEN" \
                --data "$BODY")

              echo "HTTP status: $HTTP_CODE"
              echo "Pexels response:"
              cat pexels-response.json
              echo ""

              if [ "$HTTP_CODE" -lt 200 ] || \
                 [ "$HTTP_CODE" -ge 300 ]; then
                echo "Pexels Worker request failed."
                exit 1
              fi

              if ! jq empty pexels-response.json >/dev/null 2>&1; then
                echo "Pexels response is not valid JSON."
                exit 1
              fi

              OK=$(jq -r '.ok // false' pexels-response.json)
              HUB_COMPLETE=$(jq -r '.hub_complete // false' pexels-response.json)
              COMPLETED=$(jq -r '.completed_activities // 0' pexels-response.json)
              TOTAL=$(jq -r '.total_activities // 0' pexels-response.json)
              INCOMPLETE=$(jq -r '.incomplete_activities // 0' pexels-response.json)
              FAILED=$(jq -r '.failed_activities // 0' pexels-response.json)

              if [ "$OK" != "true" ]; then
                echo "Pexels Worker returned failure."
                exit 1
              fi

              echo "Pexels progress: $COMPLETED / $TOTAL"
              echo "Incomplete activities: $INCOMPLETE"
              echo "Failed activities: $FAILED"

              if [ "$HUB_COMPLETE" = "true" ]; then
                echo ""
                echo "Pexels Large hub complete."
                break
              fi

              sleep "$PAUSE_SECONDS"
            done

            if [ "$HUB_COMPLETE" != "true" ]; then
              echo ""
              echo "Pexels Large hub did not complete."
              echo "The next hub will not be claimed."
              exit 1
            fi

            echo ""
            echo "========================================"
            echo "PEXELS LARGE HUB COMPLETE"
            echo "$HUB_NAME"
            echo "$HUB_ID"
            echo "========================================"

            if [ -n "$FIXED_HUB_ID" ]; then
              echo "Fixed hub mode complete."
              exit 0
            fi
          done
