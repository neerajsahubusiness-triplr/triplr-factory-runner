name: Factory Runner

on:
  workflow_dispatch:
    inputs:
      factory_hub_id:
        description: "Factory hub ID"
        required: true
        default: "b26532e8-68db-49f5-a97d-f3eb40526565"
      max_batches:
        description: "Max 5-activity batches"
        required: true
        default: "20"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FACTORY_HUB_ID: ${{ github.event.inputs.factory_hub_id }}
      MAX_BATCHES: ${{ github.event.inputs.max_batches }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/run-factory.js
