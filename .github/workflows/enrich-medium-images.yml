name: Enrich Medium Images

on:
  workflow_dispatch:
    inputs:
      hub_count:
        description: "How many Medium hubs to fully complete"
        required: true
        default: "15"

      activity_limit:
        description: "Activities per Worker call"
        required: true
        default: "5"

      max_calls_per_hub:
        description: "Maximum Worker calls per hub"
        required: true
        default: "20"

      pause_seconds:
        description: "Pause between calls"
        required: true
        default: "8"

      target_tier:
        description: "Tier"
        required: true
        default: "small"

      factory_hub_id:
        description: "Optional fixed Factory hub ID"
        required: false
        default: ""

jobs:
  enrich-images:
    runs-on: ubuntu-latest

    env:
      FACTORY_URL: https://triplr-factory.neeraj-sahu-business.workers.dev
      FACTORY_TOKEN: ${{ secrets.FACTORY_ADMIN_TOKEN }}

    steps:
      - name: Complete Medium hub images
        shell: bash
        run: |
          set -euo pipefail

          HUB_COUNT="${{ inputs.hub_count }}"
          ACTIVITY_LIMIT="${{ inputs.activity_limit }}"
          MAX_CALLS_PER_HUB="${{ inputs.max_calls_per_hub }}"
          PAUSE_SECONDS="${{ inputs.pause_seconds }}"
          TARGET_TIER="${{ inputs.target_tier }}"
          FIXED_FACTORY_HUB_ID="${{ inputs.factory_hub_id }}"

          for HUB_NUMBER in $(seq 1 "$HUB_COUNT"); do
            echo ""
            echo "========================================"
            echo "Starting image hub $HUB_NUMBER of $HUB_COUNT"
            echo "========================================"

            if [ -n "$FIXED_FACTORY_HUB_ID" ]; then
              FACTORY_HUB_ID="$FIXED_FACTORY_HUB_ID"
              HUB_NAME="Fixed hub"

              echo "Using fixed Factory hub ID:"
              echo "$FACTORY_HUB_ID"
            else
              CLAIM_HTTP_CODE=$(curl -sS \
                -o claim-response.txt \
                -w "%{http_code}" \
                -X POST \
                "$FACTORY_URL/factory/claim-image-hub" \
                -H "Content-Type: application/json" \
                -H "x-factory-token: $FACTORY_TOKEN" \
                --data "{
                  \"target_tier\": \"$TARGET_TIER\"
                }")

              echo "Claim HTTP status: $CLAIM_HTTP_CODE"
              echo "Raw claim response:"
              cat claim-response.txt
              echo ""

              if [ "$CLAIM_HTTP_CODE" -lt 200 ] || [ "$CLAIM_HTTP_CODE" -ge 300 ]; then
                echo "Claim endpoint failed."
                exit 1
              fi

              if ! jq empty claim-response.txt >/dev/null 2>&1; then
                echo "Claim endpoint did not return valid JSON."
                exit 1
              fi

              CLAIM_RESPONSE=$(cat claim-response.txt)

              echo "Claim response:"
              echo "$CLAIM_RESPONSE" | jq .

              CLAIM_OK=$(echo "$CLAIM_RESPONSE" | jq -r '.ok // false')

              if [ "$CLAIM_OK" != "true" ]; then
                echo "Hub claim failed."
                exit 1
              fi

              FACTORY_HUB_ID=$(echo "$CLAIM_RESPONSE" | jq -r \
                '.factory_hub_id // empty')

              HUB_NAME=$(echo "$CLAIM_RESPONSE" | jq -r \
                '.hub_name // "Unknown hub"')

              if [ -z "$FACTORY_HUB_ID" ]; then
                echo "No pending Medium image hub found."
                exit 0
              fi
            fi

            echo ""
            echo "Locked image hub:"
            echo "$HUB_NAME ($FACTORY_HUB_ID)"

            HUB_COMPLETE="false"

            for CALL_NUMBER in $(seq 1 "$MAX_CALLS_PER_HUB"); do
              echo ""
              echo "----------------------------------------"
              echo "Image call $CALL_NUMBER / $MAX_CALLS_PER_HUB"
              echo "Factory hub: $FACTORY_HUB_ID"
              echo "----------------------------------------"

              RESPONSE=$(curl -sS \
                -X POST \
                "$FACTORY_URL/factory/enrich-next-images" \
                -H "Content-Type: application/json" \
                -H "x-factory-token: $FACTORY_TOKEN" \
                --data "{
                  \"target_tier\": \"$TARGET_TIER\",
                  \"hub_limit\": 1,
                  \"activity_limit\": $ACTIVITY_LIMIT,
                  \"factory_hub_id\": \"$FACTORY_HUB_ID\"
                }")

              echo "Raw image response:"
              echo "$RESPONSE"

              if ! echo "$RESPONSE" | jq empty >/dev/null 2>&1; then
                echo "Image endpoint did not return valid JSON."
                exit 1
              fi

              echo "$RESPONSE" | jq .

              OK=$(echo "$RESPONSE" | jq -r '.ok // false')

              HUB_COMPLETE=$(echo "$RESPONSE" | jq -r \
                '.hub_complete // false')

              COMPLETE_COUNT=$(echo "$RESPONSE" | jq -r \
                '.image_complete_count // 0')

              INCOMPLETE_COUNT=$(echo "$RESPONSE" | jq -r \
                '.image_incomplete_count // 80')

              if [ "$OK" != "true" ]; then
                echo "Image Worker returned failure."
                exit 1
              fi

              echo "Image progress: $COMPLETE_COUNT / 80"
              echo "Still incomplete: $INCOMPLETE_COUNT"

              if [ "$HUB_COMPLETE" = "true" ]; then
                echo ""
                echo "Image hub complete: 80 / 80"
                break
              fi

              sleep "$PAUSE_SECONDS"
            done

            if [ "$HUB_COMPLETE" != "true" ]; then
              echo ""
              echo "Image hub did not reach 80 / 80."
              echo "Stopping. The next hub will not be claimed."
              exit 1
            fi

            echo ""
            echo "========================================"
            echo "IMAGE HUB COMPLETE"
            echo "$HUB_NAME"
            echo "$FACTORY_HUB_ID"
            echo "Images: 80 / 80"
            echo "========================================"

            if [ -n "$FIXED_FACTORY_HUB_ID" ]; then
              echo "Fixed hub mode complete."
              exit 0
            fi
          done
