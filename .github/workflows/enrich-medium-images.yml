name: Enrich Small Images

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:
    inputs:
      hub_count:
        description: "How many Small hubs to fully complete"
        required: true
        default: "15"

      activity_limit:
        description: "Activities per Worker call"
        required: true
        default: "5"

      max_calls_per_hub:
        description: "Maximum Worker calls per hub"
        required: true
        default: "20"

      pause_seconds:
        description: "Pause between calls"
        required: true
        default: "8"

      target_tier:
        description: "Tier"
        required: true
        default: "small"

      factory_hub_id:
        description: "Optional fixed Factory hub ID"
        required: false
        default: ""

concurrency:
  group: enrich-small-images-hourly
  cancel-in-progress: false

jobs:
  enrich-images:
    runs-on: ubuntu-latest

    env:
      FACTORY_URL: https://triplr-factory.neeraj-sahu-business.workers.dev
      FACTORY_TOKEN: ${{ secrets.FACTORY_ADMIN_TOKEN }}

    steps:
      - name: Complete Small hub images
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            HUB_COUNT="15"
            ACTIVITY_LIMIT="5"
            MAX_CALLS_PER_HUB="20"
            PAUSE_SECONDS="8"
            TARGET_TIER="small"
            FIXED_FACTORY_HUB_ID=""
          else
            HUB_COUNT="${{ inputs.hub_count }}"
            ACTIVITY_LIMIT="${{ inputs.activity_limit }}"
            MAX_CALLS_PER_HUB="${{ inputs.max_calls_per_hub }}"
            PAUSE_SECONDS="${{ inputs.pause_seconds }}"
            TARGET_TIER="${{ inputs.target_tier }}"
            FIXED_FACTORY_HUB_ID="${{ inputs.factory_hub_id }}"
          fi

          for HUB_NUMBER in $(seq 1 "$HUB_COUNT"); do
            echo ""
            echo "========================================"
            echo "Starting Small image hub $HUB_NUMBER of $HUB_COUNT"
            echo "========================================"

            if [ -n "$FIXED_FACTORY_HUB_ID" ]; then
              FACTORY_HUB_ID="$FIXED_FACTORY_HUB_ID"
              HUB_NAME="Fixed hub"

              echo "Using fixed Factory hub ID:"
              echo "$FACTORY_HUB_ID"
            else
              CLAIM_HTTP_CODE=$(curl -sS \
                -o claim-response.json \
                -w "%{http_code}" \
                -X POST \
                "$FACTORY_URL/factory/claim-image-hub" \
                -H "Content-Type: application/json" \
                -H "x-factory-token: $FACTORY_TOKEN" \
                --data "{
                  \"target_tier\": \"$TARGET_TIER\"
                }")

              echo "Claim HTTP status: $CLAIM_HTTP_CODE"
              echo "Raw claim response:"
              cat claim-response.json
              echo ""

              if [ "$CLAIM_HTTP_CODE" -lt 200 ] || \
                 [ "$CLAIM_HTTP_CODE" -ge 300 ]; then
                echo "Claim endpoint failed."
                exit 1
              fi

              if ! jq empty claim-response.json >/dev/null 2>&1; then
                echo "Claim endpoint did not return valid JSON."
                exit 1
              fi

              CLAIM_OK=$(jq -r '.ok // false' claim-response.json)

              if [ "$CLAIM_OK" != "true" ]; then
                echo "Hub claim failed."
                exit 1
              fi

              FACTORY_HUB_ID=$(jq -r \
                '.factory_hub_id // empty' \
                claim-response.json)

              HUB_NAME=$(jq -r \
                '.hub_name // "Unknown hub"' \
                claim-response.json)

              if [ -z "$FACTORY_HUB_ID" ]; then
                echo "No pending Small image hub found."
                exit 0
              fi
            fi

            echo ""
            echo "Locked Small image hub:"
            echo "$HUB_NAME ($FACTORY_HUB_ID)"

            HUB_COMPLETE="false"
            COMPLETE_COUNT="0"
            INCOMPLETE_COUNT="0"
            TOTAL_COUNT="0"

            for CALL_NUMBER in $(seq 1 "$MAX_CALLS_PER_HUB"); do
              echo ""
              echo "----------------------------------------"
              echo "Image call $CALL_NUMBER / $MAX_CALLS_PER_HUB"
              echo "Factory hub: $FACTORY_HUB_ID"
              echo "Activity limit: $ACTIVITY_LIMIT"
              echo "----------------------------------------"

              BODY=$(jq -n \
                --arg target_tier "$TARGET_TIER" \
                --arg factory_hub_id "$FACTORY_HUB_ID" \
                --argjson activity_limit "$ACTIVITY_LIMIT" \
                '{
                  target_tier: $target_tier,
                  hub_limit: 1,
                  activity_limit: $activity_limit,
                  factory_hub_id: $factory_hub_id
                }')

              HTTP_CODE=$(curl -sS \
                -o image-response.json \
                -w "%{http_code}" \
                -X POST \
                "$FACTORY_URL/factory/enrich-next-images" \
                -H "Content-Type: application/json" \
                -H "x-factory-token: $FACTORY_TOKEN" \
                --data "$BODY")

              echo "Image HTTP status: $HTTP_CODE"
              echo "Raw image response:"
              cat image-response.json
              echo ""

              if [ "$HTTP_CODE" -lt 200 ] || \
                 [ "$HTTP_CODE" -ge 300 ]; then
                echo "Image endpoint failed."
                exit 1
              fi

              if ! jq empty image-response.json >/dev/null 2>&1; then
                echo "Image endpoint did not return valid JSON."
                exit 1
              fi

              OK=$(jq -r '.ok // false' image-response.json)

              HUB_COMPLETE=$(jq -r \
                '.hub_complete // false' \
                image-response.json)

              COMPLETE_COUNT=$(jq -r \
                '.image_complete_count // 0' \
                image-response.json)

              INCOMPLETE_COUNT=$(jq -r \
                '.image_incomplete_count // 0' \
                image-response.json)

              TOTAL_COUNT=$((COMPLETE_COUNT + INCOMPLETE_COUNT))

              if [ "$OK" != "true" ]; then
                echo "Image Worker returned failure."
                exit 1
              fi

              echo "Image progress: $COMPLETE_COUNT / $TOTAL_COUNT"
              echo "Still incomplete: $INCOMPLETE_COUNT"

              if [ "$HUB_COMPLETE" = "true" ]; then
                echo ""
                echo "Small image hub complete: $COMPLETE_COUNT / $TOTAL_COUNT"
                break
              fi

              sleep "$PAUSE_SECONDS"
            done

            if [ "$HUB_COMPLETE" != "true" ]; then
              echo ""
              echo "Image hub did not complete within $MAX_CALLS_PER_HUB calls."
              echo "The next hub will not be claimed."
              exit 1
            fi

            echo ""
            echo "========================================"
            echo "SMALL IMAGE HUB COMPLETE"
            echo "$HUB_NAME"
            echo "$FACTORY_HUB_ID"
            echo "Images: $COMPLETE_COUNT / $TOTAL_COUNT"
            echo "========================================"

            if [ -n "$FIXED_FACTORY_HUB_ID" ]; then
              echo "Fixed hub mode complete."
              exit 0
            fi
          done
