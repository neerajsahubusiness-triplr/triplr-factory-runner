name: Enrich Medium Images

on:
  workflow_dispatch:
    inputs:
      hub_count:
        description: "How many hubs to complete"
        required: true
        default: "1"
      batches_per_hub:
        description: "16 for Medium hubs because 80 / 5 = 16"
        required: true
        default: "16"
      activity_limit:
        description: "Activities per Worker call"
        required: true
        default: "5"
      pause_seconds:
        description: "Pause between calls"
        required: true
        default: "10"
      target_tier:
        description: "Tier"
        required: true
        default: "medium"
      factory_hub_id:
        description: "Optional fixed factory hub id / leave blank for auto-claim"
        required: false
        default: ""

jobs:
  enrich-images:
    runs-on: ubuntu-latest

    steps:
      - name: Run image enrichment loop
        run: |
          HUB_COUNT=${{ github.event.inputs.hub_count }}
          BATCHES_PER_HUB=${{ github.event.inputs.batches_per_hub }}
          ACTIVITY_LIMIT=${{ github.event.inputs.activity_limit }}
          PAUSE_SECONDS=${{ github.event.inputs.pause_seconds }}
          TARGET_TIER="${{ github.event.inputs.target_tier }}"
          FIXED_FACTORY_HUB_ID="${{ github.event.inputs.factory_hub_id }}"

          for hub in $(seq 1 $HUB_COUNT); do
            echo "Starting hub $hub of $HUB_COUNT"

            if [ -n "$FIXED_FACTORY_HUB_ID" ]; then
              FACTORY_HUB_ID="$FIXED_FACTORY_HUB_ID"
              echo "Using fixed hub id: $FACTORY_HUB_ID"
            else
              CLAIM=$(curl -sS -X POST "https://triplr-factory.neeraj-sahu-business.workers.dev/factory/claim-image-hub" \
                -H "Content-Type: application/json" \
                -H "x-factory-token: ${{ secrets.FACTORY_ADMIN_TOKEN }}" \
                --data "{
                  \"target_tier\": \"${TARGET_TIER}\"
                }")

              echo "CLAIM RESPONSE:"
              echo "$CLAIM"

              FACTORY_HUB_ID=$(echo "$CLAIM" | jq -r '.factory_hub_id // empty')
              HUB_NAME=$(echo "$CLAIM" | jq -r '.hub_name // empty')

              if [ -z "$FACTORY_HUB_ID" ]; then
                echo "No pending hub found. Stopping."
                exit 0
              fi

              echo "Claimed hub: $HUB_NAME ($FACTORY_HUB_ID)"
            fi

            for batch in $(seq 1 $BATCHES_PER_HUB); do
              echo "Hub $hub / Batch $batch of $BATCHES_PER_HUB"
              echo "Processing factory hub id: $FACTORY_HUB_ID"

              BODY="{
                \"target_tier\": \"${TARGET_TIER}\",
                \"hub_limit\": 1,
                \"activity_limit\": ${ACTIVITY_LIMIT},
                \"factory_hub_id\": \"${FACTORY_HUB_ID}\"
              }"

              curl -sS -X POST "https://triplr-factory.neeraj-sahu-business.workers.dev/factory/enrich-next-images" \
                -H "Content-Type: application/json" \
                -H "x-factory-token: ${{ secrets.FACTORY_ADMIN_TOKEN }}" \
                --data "$BODY"

              echo ""
              sleep $PAUSE_SECONDS
            done

            echo "Finished hub loop $hub"
          done
