name: Factory Medium Hubs

on:
  workflow_dispatch:
    inputs:
      pause_ms:
        description: "Pause between cluster batches"
        required: true
        default: "12000"
      max_steps_per_hub:
        description: "Max step calls per hub"
        required: true
        default: "30"
      max_hubs_per_worker:
        description: "Max hubs each worker can process"
        required: true
        default: "5"

jobs:
  run-medium:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [1, 2, 3]

    steps:
      - name: Run medium hubs with limit
        run: |
          for hub_num in $(seq 1 ${{ github.event.inputs.max_hubs_per_worker }}); do
            echo "Worker ${{ matrix.worker }} starting hub $hub_num"
            HUB_ID=""

            for i in $(seq 1 ${{ github.event.inputs.max_steps_per_hub }}); do
              if [ -z "$HUB_ID" ]; then
                PAYLOAD="{\"pause_ms\":${{ github.event.inputs.pause_ms }}}"
              else
                PAYLOAD="{\"factory_hub_id\":\"$HUB_ID\",\"pause_ms\":${{ github.event.inputs.pause_ms }}}"
              fi

              RESPONSE=$(curl -sS -X POST "$FACTORY_URL/factory/run-next-small-hub-step" \
                -H "content-type: application/json" \
                -H "x-factory-token: $FACTORY_TOKEN" \
                -d "$PAYLOAD")

              echo "$RESPONSE"

              if ! echo "$RESPONSE" | jq empty >/dev/null 2>&1; then
                echo "Non-JSON response from Worker. Will retry this step."
                sleep 30
                continue
              fi

              HUB_ID=$(echo "$RESPONSE" | jq -r '.factory_hub_id // empty')

              if echo "$RESPONSE" | jq -e '.no_pending_hubs == true' > /dev/null; then
                echo "No pending hubs. Exiting."
                exit 0
              fi

              if echo "$RESPONSE" | jq -e '.hub_done == true' > /dev/null; then
                echo "Hub completed."
                break
              fi

              if echo "$RESPONSE" | jq -e '.ok != true' > /dev/null; then
                echo "Worker failed."
                exit 1
              fi

              sleep $(( ${{ github.event.inputs.pause_ms }} / 1000 ))
            done
          done
        env:
          FACTORY_URL: ${{ secrets.FACTORY_URL }}
          FACTORY_TOKEN: ${{ secrets.FACTORY_TOKEN }}
