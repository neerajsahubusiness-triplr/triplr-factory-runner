run: |
  HUB_ID=""

  for i in $(seq 1 ${{ github.event.inputs.max_steps }}); do
    if [ -z "$HUB_ID" ]; then
      PAYLOAD="{\"pause_ms\":${{ github.event.inputs.pause_ms }},\"max_steps\":${{ github.event.inputs.max_steps }}}"
    else
      PAYLOAD="{\"factory_hub_id\":\"$HUB_ID\",\"pause_ms\":${{ github.event.inputs.pause_ms }},\"max_steps\":${{ github.event.inputs.max_steps }}}"
    fi

    RESPONSE=$(curl -sS -X POST "$FACTORY_URL/factory/run-next-medium-hub-step" \
      -H "content-type: application/json" \
      -H "x-factory-token: $FACTORY_TOKEN" \
      -d "$PAYLOAD")

    echo "$RESPONSE"

    HUB_ID=$(echo "$RESPONSE" | jq -r '.factory_hub_id // empty')

    if echo "$RESPONSE" | jq -e '.no_pending_hubs == true' > /dev/null; then
      echo "No pending hubs. Exiting."
      exit 0
    fi

    if echo "$RESPONSE" | jq -e '.hub_done == true' > /dev/null; then
      echo "Hub completed."
      exit 0
    fi

    if echo "$RESPONSE" | jq -e '.ok != true' > /dev/null; then
      echo "Worker failed."
      exit 1
    fi

    sleep $(( ${{ github.event.inputs.pause_ms }} / 1000 ))
  done
