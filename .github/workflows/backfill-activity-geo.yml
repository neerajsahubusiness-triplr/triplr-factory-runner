name: Backfill Activity Geo

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Rows per run"
        required: true
        default: "500"

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Run geo backfill
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          LIMIT: ${{ github.event.inputs.limit }}
        with:
          script: |
            const limit = Math.min(Number(process.env.LIMIT || 500), 1000);

            async function supabase(path, options = {}) {
              const res = await fetch(`${process.env.SUPABASE_URL}/rest/v1/${path}`, {
                ...options,
                headers: {
                  apikey: process.env.SUPABASE_SERVICE_ROLE_KEY,
                  Authorization: `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                  "Content-Type": "application/json",
                  Prefer: options.prefer || "return=representation",
                  ...(options.headers || {})
                }
              });

              const text = await res.text();
              if (!res.ok) throw new Error(`Supabase ${res.status}: ${text}`);
              return text ? JSON.parse(text) : null;
            }

            const rows = await supabase(
              `factory_activity_geo_backfill?status=eq.pending&google_place_id=not.is.null&order=created_at.asc&limit=${limit}&select=id,activity_id,activity_name,google_place_id,attempts`
            );

            console.log(`Picked ${rows.length} rows`);

            let done = 0;
            let failed = 0;

            for (const row of rows) {
              try {
                const url = `https://places.googleapis.com/v1/places/${encodeURIComponent(row.google_place_id)}`;

                const res = await fetch(url, {
                  headers: {
                    "X-Goog-Api-Key": process.env.GOOGLE_PLACES_API_KEY,
                    "X-Goog-FieldMask": "location"
                  }
                });

                const data = await res.json();

                if (!res.ok) {
                  throw new Error(JSON.stringify(data));
                }

                const lat = data?.location?.latitude;
                const lng = data?.location?.longitude;

                if (typeof lat !== "number" || typeof lng !== "number") {
                  throw new Error("No location returned");
                }

                await supabase(`factory_activity_geo_backfill?id=eq.${row.id}`, {
                  method: "PATCH",
                  body: JSON.stringify({
                    lat,
                    lng,
                    status: "done",
                    error: null,
                    attempts: (row.attempts || 0) + 1,
                    updated_at: new Date().toISOString()
                  })
                });

                done++;
                console.log(`DONE: ${row.activity_name}`);

              } catch (err) {
                failed++;

                await supabase(`factory_activity_geo_backfill?id=eq.${row.id}`, {
                  method: "PATCH",
                  body: JSON.stringify({
                    status: "failed",
                    error: String(err.message || err),
                    attempts: (row.attempts || 0) + 1,
                    updated_at: new Date().toISOString()
                  })
                });

                console.log(`FAILED: ${row.activity_name} - ${String(err.message || err).slice(0, 250)}`);
              }

              await new Promise(r => setTimeout(r, 100));
            }

            console.log(`Finished. Done=${done}, Failed=${failed}`);
